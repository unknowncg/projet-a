<head>

    <title>Document</title>

    <!-- CSS DE MA BAR DE NAVIGATION-->
    <style>
        .nav {
            display: flex;
            justify-content: space-around;
            background-color: #333;
            padding: 10px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
        }

        .nav a:hover {
            background-color: #ddd;
            color: black;
        }

        /*** CSS DE LA PARTIE FOOTER DU SITE WEB*/
            .footer {
                background-color: #333;
                color: white;
                text-align: center;
                padding: 10px;
                position: fixed;
                width: 100%;
                bottom: 0;
            }
    </style>
</head>
<body>
    <h1>Hello World</h1> 
    <!-- MA BAR DE NAVIGATION-->
    <nav class="nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <!-- LE FOOTER DU SITE WEB-->
    <div class="footer">
        &copy; 2024 My Website. All rights reserved.
    </div>
</body>
</html>
